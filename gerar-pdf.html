<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daure Express - Documentação Completa</title>
    <style>
        @page {
            size: A4;
            margin: 2cm;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 210mm;
            margin: 0 auto;
            padding: 20px;
            background: white;
        }
        
        h1 {
            color: #2563eb;
            font-size: 28px;
            margin-top: 30px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #2563eb;
            page-break-after: avoid;
        }
        
        h2 {
            color: #1e40af;
            font-size: 22px;
            margin-top: 25px;
            margin-bottom: 12px;
            page-break-after: avoid;
        }
        
        h3 {
            color: #3b82f6;
            font-size: 18px;
            margin-top: 20px;
            margin-bottom: 10px;
            page-break-after: avoid;
        }
        
        h4 {
            color: #60a5fa;
            font-size: 16px;
            margin-top: 15px;
            margin-bottom: 8px;
        }
        
        h5 {
            color: #93c5fd;
            font-size: 14px;
            margin-top: 12px;
            margin-bottom: 6px;
        }
        
        p {
            margin-bottom: 12px;
            text-align: justify;
        }
        
        ul, ol {
            margin-left: 25px;
            margin-bottom: 12px;
        }
        
        li {
            margin-bottom: 6px;
        }
        
        code {
            background-color: #f3f4f6;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #dc2626;
        }
        
        pre {
            background-color: #1f2937;
            color: #f9fafb;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 15px;
            page-break-inside: avoid;
        }
        
        pre code {
            background-color: transparent;
            color: #f9fafb;
            padding: 0;
        }
        
        blockquote {
            border-left: 4px solid #fbbf24;
            padding-left: 15px;
            margin: 15px 0;
            background-color: #fef3c7;
            padding: 10px 15px;
            border-radius: 3px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            page-break-inside: avoid;
        }
        
        th, td {
            border: 1px solid #d1d5db;
            padding: 10px;
            text-align: left;
        }
        
        th {
            background-color: #3b82f6;
            color: white;
            font-weight: bold;
        }
        
        tr:nth-child(even) {
            background-color: #f9fafb;
        }
        
        hr {
            border: none;
            border-top: 2px solid #e5e7eb;
            margin: 25px 0;
        }
        
        .cover-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            page-break-after: always;
        }
        
        .cover-page h1 {
            font-size: 48px;
            border: none;
            margin: 0;
        }
        
        .cover-page p {
            font-size: 20px;
            color: #6b7280;
            margin-top: 20px;
        }
        
        .emoji {
            font-size: 1.2em;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 5px;
        }
        
        .badge-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .badge-warning {
            background-color: #fef3c7;
            color: #92400e;
        }
        
        .badge-info {
            background-color: #dbeafe;
            color: #1e40af;
        }
        
        @media print {
            body {
                background: white;
            }
            
            h1, h2, h3 {
                page-break-after: avoid;
            }
            
            pre, blockquote, table {
                page-break-inside: avoid;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="cover-page">
        <h1>📱 Daure Express</h1>
        <p>Documentação Completa do Sistema</p>
        <p style="margin-top: 50px; font-size: 16px;">Fevereiro de 2026</p>
    </div>
    
    <div id="content"></div>
    
    <script>
        // Carrega o arquivo Markdown
        fetch('./DOCUMENTACAO_COMPLETA.md')
            .then(response => response.text())
            .then(markdown => {
                // Converte Markdown para HTML
                const html = marked.parse(markdown);
                document.getElementById('content').innerHTML = html;
                
                // Aguarda um pouco e depois imprime
                setTimeout(() => {
                    window.print();
                }, 1000);
            })
            .catch(error => {
                console.error('Erro ao carregar o arquivo:', error);
                document.getElementById('content').innerHTML = '<p style="color: red;">Erro ao carregar o arquivo Markdown. Por favor, certifique-se de que DOCUMENTACAO_COMPLETA.md está no mesmo diretório.</p>';
            });
    </script>
</body>
</html>
